#:schema https://jj-vcs.github.io/jj/latest/config-schema.json

[user]
name = "David Guevara"
email = "datwaftx@gmail.com"

[ui]
default-command = "log"
diff-formatter = ["difft", "--color=always", "$left", "$right"]
diff-editor = ":builtin"

[signing]
behavior = "drop"
backend = "ssh"
key = "ssh-ed25519 AAAAC3NzaC1lZDI1NTE5AAAAINtR9uu/tD0SNXfh75fS2sACiGlBMhxfhCxgbBsp+21i"
backends.ssh.program = "git-ssh-sign.sh"

[git]
sign-on-push = true

[template-aliases]
'format_short_signature(signature)' = 'coalesce(signature.name(), signature.email())'

[revset-aliases]
'nearest_bookmark()' = 'heads(bookmarks() & ::@)'

[aliases]
nb = ["log", "-r", "nearest_bookmark()", "--no-graph", "-T", "bookmarks"]
nearest-bookmark = ["log", "-r", "nearest_bookmark()", "--no-graph", "-T", "bookmarks"]

[fix.tools.sort-word-list]
command = ["env", "LC_ALL=C", "sort", "-u"]
patterns = ["glob:'**/*.add'"]

[fix.tools.biome]
enabled = false
command = ["npx", "--no-install", "biome", "format", "--stdin-file-path", "$path"]
patterns = [
  "glob:'**/*.js'",
  "glob:'**/*.jsx'",
  "glob:'**/*.ts'",
  "glob:'**/*.tsx'",
  "glob:'**/*.json'",
  "glob:'**/*.jsonc'",
  "glob:'**/*.css'",
  "glob:'**/*.graphql'",
]

[fix.tools.prettier]
enabled = false
command = ["npx", "--no-install", "prettier", "--stdin-filepath", "$path"]
patterns = [
  "glob:'**/*.js'",
  "glob:'**/*.jsx'",
  "glob:'**/*.ts'",
  "glob:'**/*.tsx'",
  "glob:'**/*.mjs'",
  "glob:'**/*.cjs'",
  "glob:'**/*.mts'",
  "glob:'**/*.cts'",
  "glob:'**/*.json'",
  "glob:'**/*.jsonc'",
  "glob:'**/*.yaml'",
  "glob:'**/*.yml'",
  "glob:'**/*.md'",
  "glob:'**/*.mdx'",
  "glob:'**/*.html'",
  "glob:'**/*.css'",
  "glob:'**/*.scss'",
  "glob:'**/*.less'",
  "glob:'**/*.graphql'",
]
